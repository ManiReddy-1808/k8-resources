apiVersion: v1
kind: Pod
metadata:
  name: test-pod
spec:
  containers:
  - image: nginx
    name: nginx
    volumeMounts:
    - mountPath: /var/log/nginx
      name: nginx-logs
  - image: almalinux
    name: almalinux
    volumeMounts:
    - mountPath: /mnt/nginx-logs
      name: nginx-logs
      readOnly: true
  # This is at pod level
  volumes:
  - name: nginx-logs
    emptyDir:
      sizeLimit: 500Mi